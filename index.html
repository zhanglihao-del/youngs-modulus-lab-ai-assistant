<body>
    <!-- 实验器材装饰 -->
    <div class="equipment eq1"></div>
    <div class="equipment eq2"></div>
    <div class="equipment eq3"></div>

    <div class="container">
        <div class="title">杨氏模量实验AI答疑伴侣</div>
        <div class="sub">基于AI大模型 + 实验材料｜深度解答 · 专业权威</div>

        <div class="card">
            <h3>💬 你对杨氏模量实验的疑问还有啥吖~</h3>
            <textarea id="q" placeholder="我猜猜~你肯定会问：光杠杆原理、公式推导、逐差法、误差来源、仪器怎么调、实验报告怎么写等"></textarea>
            <button class="btn" onclick="ask()">🧠 轻轻敲我一下 我才回答你噢 </button>
        </div>

        <div class="card">
            <h3>📘 我的深度解答在下面吖~</h3>
            <div class="ans-box" id="ans">我已准备接受拷问啦，可以为你解答原理、步骤、误差、仪器、报告等全部深度问题噢～</div>
        </div>
    </div>

<script>
const API_KEY = "sk-929f977a6546471a90d935b7bc1d79a5";
const MODEL = "qwen-turbo";

const KNOWLEDGE = `
# 杨氏模量实验官方说明书（完整版）

## 一、实验概述
力作用于物体产生形变，弹性形变分纵向、切变、扭转、弯曲。
杨氏模量E：材料抵抗拉伸形变能力，仅与材料性质有关。
本实验采用**拉伸法+光杠杆法**测金属丝杨氏模量。

## 二、实验目的
1. 学会拉伸法测杨氏模量；
2. 掌握光杠杆微小位移放大原理；
3. 掌握游标卡尺、千分尺、钢卷尺、望远镜使用；
4. 学会数据处理、误差分析、不确定度计算。

## 三、实验仪器
- 杨氏模量仪（含金属丝、光杠杆、望远镜、标尺）
- 螺旋测微器（精度0.01mm）
- 游标卡尺（精度0.02mm）
- 钢卷尺（精度1mm）
- 数字拉力计、LED标尺

## 四、核心原理
### 1. 杨氏模量定义
$$E=\\frac{\\sigma}{\\varepsilon}=\\frac{F/S}{\\Delta L/L}$$
S=πd²/4

### 2. 光杠杆放大
ΔL：金属丝微小伸长
Δx：标尺读数变化
放大倍数：2H/D
$$\\Delta L=\\frac{D\\cdot\\Delta x}{2H}$$

### 3. 最终公式
$$E=\\frac{8FLH}{\\pi d^2 D \\Delta x}$$

## 五、实验步骤
1. 调平仪器，拉直金属丝；
2. 调节望远镜：粗调共轴、细调清晰、消视差；
3. 测L、H、D；
4. 千分尺测直径5次；
5. 加砝码（3→10kg）记录标尺；
6. 减砝码记录标尺；
7. 取平均、逐差法/最小二乘法处理；
8. 计算E并分析误差。

## 六、数据处理
1. 直径取平均；
2. 加减读数取平均；
3. 逐差法：消除系统误差、提高精度；
4. 最小二乘法：拟合F-x直线求斜率k；
5. E=8gLH/(πd²Dk)

## 七、误差来源
1. 金属丝直径不均、千分尺读数误差；
2. 光杠杆未放平、镜面倾斜；
3. 望远镜视差、读数视差；
4. 金属丝弯曲、未竖直；
5. 砝码质量误差、振动影响；
6. 温度影响。

## 八、仪器参数
- 望远镜：0.3~8m
- 放大倍数：30~50倍
- 标尺：0~8cm，1mm
- 千分尺：25mm，0.01mm
- 金属丝：65Mn，约0.7mm
- E理论：约196~198 GPa

## 九、逐差法
分组：前4、后4
对应项相减，求平均Δx，消除线性误差

## 十、最小二乘法
拟合F=kx+b，k为劲度系数，E与k成反比

## 十一、实验报告要点
目的、原理、仪器、步骤、数据、处理、结果、误差、结论

## 十二、答辩重点
光杠杆放大、公式推导、逐差法、误差、仪器调节、数据处理
`;

async function ask() {
    const q = document.getElementById("q").value.trim();
    const ans = document.getElementById("ans");
    if (!q) { ans.innerHTML = "⚠️ 笨蛋！你都没输入问题，我咋回答你嘞~"; return; }
    ans.innerHTML = "🧠 我正在思考ing...";

    const prompt = `
你是大学物理实验资深讲师，**完全基于下面官方说明书** + **深度物理理解**回答学生问题。
学生不问数据也能答原理、步骤、误差、仪器、报告、答辩、逐差法、光杠杆、公式、实验反思。
回答要求：
1. 专业、深度、严谨、竞赛答辩水平；
2. 用Markdown排版、公式用$$或$；
3. 分点清晰、逻辑完整；
4. 结合说明书，不要编造；
5. 语言易懂，适合大学生。

【实验说明书全文】
${KNOWLEDGE}

【学生问题】
${q}
`;

    try {
        const res = await fetch("https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: MODEL,
                input: { prompt },
                parameters: { temperature: 0.2, result_format: "text" }
            })
        });
        const data = await res.json();
        const text = data.output.text;
        ans.innerHTML = marked.parse(text);
        MathJax.typesetPromise([ans]);
    } catch (e) {
        ans.innerHTML = "❌ 请求失败：" + e.message;
    }
}
</script>
