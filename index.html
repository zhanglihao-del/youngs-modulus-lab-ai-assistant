<script>
const API_KEY = "sk-929f977a6546471a90d935b7bc1d79a5";
const MODEL = "qwen-turbo";

// 仅更新此处知识库，其余代码、注释、交互完全保留原样
const KNOWLEDGE = `
# 杨氏模量实验官方说明书（同步计算系统V3.0 完整底层逻辑）
## 一、实验概述
力作用于物体产生形变，弹性形变分纵向、切变、扭转、弯曲。
杨氏模量E：材料抵抗拉伸形变能力，仅与材料性质有关。
本实验采用**拉伸法+光杠杆法**测金属丝杨氏模量，配套程序完成数据处理、最小二乘拟合、A/B类不确定度评定、拟合曲线绘制。
全程基准单位：mm，结果同时输出 $\mathrm{N/mm^2}$、$\mathrm{GPa}$。

## 二、实验目的
1. 学会拉伸法测杨氏模量；
2. 掌握光杠杆微小位移放大原理；
3. 掌握游标卡尺、千分尺、钢卷尺、望远镜使用；
4. 学会数据处理、误差分析、完整不确定度计算。

## 三、实验仪器
- 杨氏模量仪（含金属丝、光杠杆、望远镜、标尺）
- 螺旋测微器（仪器极限误差0.004mm）
- 游标卡尺（测光杠杆D，极限误差0.02mm）
- 钢卷尺（测L、H，极限误差0.5mm）
- 数字拉力计、LED标尺

## 四、核心原理
### 1. 杨氏模量定义
$$E=\frac{\sigma}{\varepsilon}=\frac{F/S}{\Delta L/L}$$
横截面积 $S=\pi d^2/4$

### 2. 光杠杆放大
ΔL：金属丝微小伸长
Δx：标尺读数变化
放大倍数：$2H/D$
$$\Delta L=\frac{D\cdot\Delta x}{2H}$$

### 3. 最终计算公式（程序使用）
$$E=\frac{8FLH}{\pi d^2 D \Delta x}$$
拟合形式：$x = kF+b$，代入得：
$$E = \frac{8LH}{\pi d^2 D k}$$

## 五、实验步骤
1. 调平仪器，拉直金属丝；
2. 调节望远镜：粗调共轴、细调清晰、消视差；
3. 测量几何量 L、H、D；
4. 千分尺测金属丝直径5次，记录零点读数；
5. 加砝码（3→10kg）记录标尺读数；
6. 减砝码记录标尺读数；
7. 读数取平均，最小二乘法拟合求斜率k；
8. 计算E及全套不确定度，绘制F-x拟合曲线。

## 六、原始数据预处理
### 1. 标尺读数平均（消除弹性滞后）
$$\bar{x}_i = \frac{x_{\text{加},i}+x_{\text{减},i}}{2}$$
### 2. 拉力计算
砝码质量 $m(\mathrm{kg})$，$g=9.8\mathrm{m/s^2}$
$$F_i = m_i \cdot g$$
### 3. 直径零点修正
$d_0$：千分尺零点，$\bar{d}_{\text{raw}}$：5次测量均值
$$d = \bar{d}_{\text{raw}} - d_0$$

## 七、不确定度完整计算（与程序完全一致）
### 7.1 金属丝直径 d（5次重复测量）
#### A类不确定度（统计分量）
$$u_A(d) = \sqrt{\frac{\sum_{i=1}^n (d_i-\bar{d}_{\text{raw}})^2}{n(n-1)}},\quad n=5$$
#### B类不确定度（仪器误差，均匀分布）
$$u_B(d) = \frac{\Delta_{\text{仪}}}{\sqrt{3}},\quad \Delta_{\text{仪}}=0.004\ \mathrm{mm}$$
#### 合成标准不确定度
$$u(d) = \sqrt{u_A(d)^2 + u_B(d)^2}$$

### 7.2 几何量 L、H、D（单次测量）
单次测量无统计误差，$u_A=0$，仅计算B类不确定度：
$$u(L)=u(H)=\frac{0.5}{\sqrt{3}},\quad u(D)=\frac{0.02}{\sqrt{3}}$$

### 7.3 最小二乘拟合 & 斜率不确定度 $u(k)$
设拟合方程：$x = kF + b$
1. 基础求和：$\sum F,\ \sum x,\ \sum Fx,\ \sum F^2$
2. 斜率：
$$k=\frac{n\sum Fx-\sum F \sum x}{n\sum F^2-(\sum F)^2}$$
3. 截距：$b=\bar{x}-k\bar{F}$

4. 残差平方和（两种等价写法）
代码实现（逐点计算）：
$$S_e=\sum_{i=1}^n (x_i-\hat{x}_i)^2,\quad \hat{x}_i=kF_i+b$$
手写公式等价形式：
$$S_{xF}=\sum F_i x_i-\frac{(\sum F)(\sum x)}{n},\quad S_{xx}=\sum x_i^2-\frac{(\sum x)^2}{n}$$
$$S_e = S_{xx} - k\cdot S_{xF}$$

5. 拟合标准偏差：
$$s_x = \sqrt{\frac{S_e}{n-2}}$$
6. 自变量离差平方和：
$$S_{FF}=\sum (F_i-\bar{F})^2$$
7. 斜率标准不确定度：
$$u(k) = \frac{s_x}{\sqrt{S_{FF}}}$$

### 7.4 杨氏模量相对不确定度（程序核心公式）
$$
\frac{u(E)}{E}
= \sqrt{\left(\frac{u_L}{L}\right)^2
+\left(\frac{u_H}{H}\right)^2
+\left(\frac{u_D}{D}\right)^2
+\left(2\frac{u_d}{d}\right)^2
+\left(\frac{u_k}{k}\right)^2}
$$

### 7.5 合成与扩展不确定度
$$u_E = E \cdot \frac{u(E)}{E}$$
包含因子 $k=2$，扩展不确定度：
$$U_E = 2\cdot u_E$$

## 八、单位换算
$$1\ \mathrm{N/mm^2} = 1\ \mathrm{GPa}$$

## 九、最小二乘法
拟合 $x=kF+b$，$k$ 为单位拉力对应的标尺变化量，E与k成反比；程序同时输出拟合曲线。

## 十、误差来源
1. 金属丝直径不均、千分尺读数误差；
2. 光杠杆未放平、镜面倾斜；
3. 望远镜视差、人为读数误差；
4. 金属丝弯曲、未竖直；
5. 砝码质量误差、加载卸载弹性滞后；
6. 装置振动、温度影响。

## 十一、仪器参数
- 望远镜：0.3~8m
- 放大倍数：30~50倍
- 标尺：0~8cm，1mm
- 千分尺：25mm，0.01mm，极限误差0.004mm
- 金属丝：65Mn，约0.7mm
- E理论：约196~198 GPa

## 十二、实验报告要点
目的、原理、仪器、步骤、原始数据、**全套不确定度计算**、最小二乘拟合、结果表达式、误差分析、结论。

## 十三、答辩重点
光杠杆放大原理、公式完整推导、A/B类不确定度区别、最小二乘法、残差两种等价形式、斜率不确定度、不确定度传递、仪器调节、误差分析。
`;

async function ask() {

    const ans = document.getElementById("ans");

    ans.innerHTML = "🧠 我正在思考ing...";

    const prompt = `
你是大学物理实验资深讲师，**完全基于下面官方说明书** + **深度物理理解**回答学生问题。
学生不问数据也能答原理、步骤、误差、仪器、报告、答辩、逐差法、光杠杆、公式、实验反思。
回答要求：
1. 专业、深度、严谨、竞赛答辩水平；
2. 用Markdown排版、公式用$$或$；
3. 分点清晰、逻辑完整；
4. 结合说明书，不要编造；
5. 语言易懂，适合大学生。

【实验说明书全文】
${KNOWLEDGE}

【学生问题】
${q}
`;

    try {
        const res = await fetch("https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY

                model: MODEL,

                parameters: { temperature: 0.2, result_format: "text" }
            })
        });

        const text = data.output.text;
        ans.innerHTML = marked.parse(text);
        MathJax.typesetPromise([ans]);
    } catch (e) {
        ans.innerHTML = "❌ 请求失败：" + e.message;
    }
}
