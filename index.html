<body> 
    <div class="container">

<script>
const API_KEY = "sk-929f977a6546471a90d935b7bc1d79a5";
const MODEL = "qwen-turbo";

const KNOWLEDGE = `
# 杨氏模量实验官方说明书（完整版）

## 一、实验概述
力作用于物体产生形变，弹性形变分纵向、切变、扭转、弯曲。
杨氏模量E：材料抵抗拉伸形变能力，仅与材料性质有关。
本实验采用**拉伸法+光杠杆法**测金属丝杨氏模量。

## 二、实验目的
1. 学会拉伸法测杨氏模量；
2. 掌握光杠杆微小位移放大原理；
3. 掌握游标卡尺、千分尺、钢卷尺、望远镜使用；
4. 学会数据处理、误差分析、不确定度计算。

## 三、实验仪器
- 杨氏模量仪（含金属丝、光杠杆、望远镜、标尺）
- 螺旋测微器（精度0.01mm）
- 游标卡尺（精度0.02mm）
- 钢卷尺（精度1mm）
- 数字拉力计、LED标尺

## 四、核心物理量定义（标准定义）
- D：光杠杆常数，定义为光杠杆后足尖到前两足连线的垂直距离。
- H：镜尺距，定义为光杠杆反射镜转轴到发光标尺的垂直距离。
- Δx：标尺刻度变化量，定义为经光杠杆放大后，望远镜中观测到的标尺读数变化量。
- θ：光杠杆偏转角，定义为金属丝伸长时，光杠杆反射镜转过的微小角度。
- M：光杠杆放大倍数，定义为光杠杆将微小伸长量ΔL放大为Δx的倍率，M=2H/D。

## 五、核心原理
### 1. 杨氏模量定义
$$E=\\frac{\\sigma}{\\varepsilon}=\\frac{F/S}{\\Delta L/L}$$
S=πd²/4

### 2. 光杠杆放大原理
- 几何关系：$\\Delta L = \\frac{D}{2H} \\cdot \\Delta x$
- 放大倍数：$M = \\frac{2H}{D}$

### 3. 最终公式
$$E=\\frac{8FLH}{\\pi d^2 D \\Delta x}$$

## 六、实验步骤
1. 调平仪器，拉直金属丝；
2. 调节望远镜：粗调共轴、细调清晰、消视差；
3. 测L、H、D；
4. 千分尺测直径5次；
5. 加砝码（3→10kg）记录标尺；
6. 减砝码记录标尺；
7. 取平均、逐差法/最小二乘法处理；
8. 计算E并分析误差。

## 七、数据处理
1. 直径取平均；
2. 加减读数取平均；
3. 逐差法：消除系统误差、提高精度；
4. 最小二乘法：拟合F-x直线求斜率k；
5. E=8gLH/(πd²Dk)

## 八、误差来源
1. 金属丝直径不均、千分尺读数误差；
2. 光杠杆未放平、镜面倾斜；
3. 望远镜视差、读数视差；
4. 金属丝弯曲、未竖直；
5. 砝码质量误差、振动影响；
6. 温度影响。

## 九、逐差法
分组：前4、后4
对应项相减，求平均Δx，消除线性误差

## 十、最小二乘法
拟合F=kx+b，k为劲度系数，E与k成反比

## 十一、实验报告要点
目的、原理、仪器、步骤、数据、处理、结果、误差、结论

## 十二、答辩重点
光杠杆放大、公式推导、逐差法、误差、仪器调节、数据处理

# ===================== 深度物理思考体系（AI 举一反三、自由推理）=====================
## 一、实验核心物理本质
1. 必须保证金属丝处于**纯弹性形变范围**，胡克定律 F=kΔL 严格成立；
2. 光杠杆的作用是**线性放大微小位移**，ΔL 与 Δx 必须保持严格线性；
3. 所有操作规范、仪器选择、数据处理，均围绕：**保线性、消误差、提精度**。

## 二、操作逻辑（为什么要/不要做某件事）
- 预拉金属丝：消除弯曲松弛，保证纯弹性形变；
- 加减力双向测量：消除机械回程间隙误差；
- 禁止回旋螺母：避免破坏拉力与位移的线性关系；
- 禁止震动：光杠杆对微位移极敏感，震动直接导致读数失真；
- 禁止中途调望远镜：光路与放大系统固定，调节会让全部数据失效；
- 多位置测直径：金属丝非正圆，d²对结果影响极大，必须减小系统误差；
- 拉力不超上限：防止进入塑性形变，使公式完全失效。

## 三、仪器选择逻辑（量程 + 精度匹配）
- L、H 大尺寸 → 钢卷尺（量程足够）
- D 中等尺寸 → 游标卡尺（精度匹配）
- d 微小尺寸 → 螺旋测微器（高精度必需）
- 微小形变 → 光杠杆放大（30~50倍）
- 光路观测 → 望远镜（消视差、精准读数）

## 四、误差分析逻辑
- 系统误差：仪器倾斜、直径不均、间隙、光路偏移（可消除）
- 随机误差：震动、读数偏差、环境干扰（可减小）

## 五、数据处理逻辑
- 逐差法 / 线性拟合：充分利用数据、消除线性系统误差、验证胡克定律
- 简单平均：丢失线性关系，精度低，不推荐使用
`;

async function ask() {
    const q = document.getElementById("q").value.trim();
    const ans = document.getElementById("ans");
    if (!q) { ans.innerHTML = "⚠️ 笨蛋！你都没输入问题，我咋回答你嘞~"; return; }
    ans.innerHTML = "🧠 我正在思考ing...";

    const prompt = `
你是大学物理实验顶级资深讲师，回答必须严格遵循标准定义：
- 光杠杆常数指的是D（后足到前两足连线的垂直距离），不是放大倍数M。
- 放大倍数M=2H/D，其中H是反射镜转轴到标尺的垂直距离。
- 所有回答必须严谨、精准，和标准定义保持一致。

回答规则：
1. 学生问什么，**只精准回答什么**，直击物理本质；
2. 所有公式必须用$$块级公式，单独一行、居中显示；
3. 分段清晰、排版整洁、文字与公式不重叠；
4. 语言专业、简洁、严谨；
5. 绝不背诵固定题库，所有回答均为**实时逻辑分析**。

【实验知识库】
${KNOWLEDGE}

【学生问题】
${q}
`;

    try {
        const res = await fetch("https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: MODEL,
                input: { prompt },
                parameters: { temperature: 0.1, result_format: "text" }
            })
        });
        const data = await res.json();
        const text = data.output.text;
        if (typeof marked !== 'undefined') {
            ans.innerHTML = marked.parse(text);
            await MathJax.typesetPromise([ans]);
        } else {
            ans.innerHTML = text.replace(/\n/g, '<br>');
        }
    } catch (e) {
        ans.innerHTML = "❌ 请求失败：" + e.message;
    }
}
</script>
